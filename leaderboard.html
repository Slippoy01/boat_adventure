<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0 20px;
    }

    h1 {
      font-size: 36px;
      margin-top: 20px;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 80%;
      color: white;
    }

    th, td {
      border: 1px solid white;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: rgba(255, 255, 255, 0.2);
    }

    .back-button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      color: white;
      background-color: rgba(255, 99, 71, 0.8);
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }

    .back-button:hover {
      background-color: rgba(255, 99, 71, 1);
    }

    .comments {
      margin-top: 40px;
      text-align: left;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .comment-form textarea {
      width: 100%;
      height: 80px;
      font-size: 16px;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
    }

    .comment-form button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background-color: rgba(70, 130, 180, 0.8);
      color: white;
      cursor: pointer;
    }

    .comment-form button:hover {
      background-color: rgba(70, 130, 180, 1);
    }

    .comment-item {
      background-color: rgba(255, 255, 255, 0.05);
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }

    .comment-item time {
      display: block;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>Leaderboard</h1>
  <table id="leaderboard">
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody>
      <!-- Leaderboard data -->
    </tbody>
  </table>
  <a href="index.html" class="back-button">Back to Game</a>

  <!-- KOMENTAR -->
  <div class="comments">
    <h2>Comments</h2>

    <form class="comment-form" onsubmit="submitComment(event)">
      <textarea id="commentText" placeholder="Leave your comment..."></textarea>
      <br />
      <button type="submit">Submit</button>
    </form>

    <div id="commentList"></div>
  </div>

  <script>
    async function fetchLeaderboard() {
      try {
        const response = await fetch('https://shiemir.my.id/boat_adventure/leaderboard.php');
        const leaderboard = await response.json();
        const tableBody = document.querySelector('#leaderboard tbody');
        tableBody.innerHTML = '';

        leaderboard.forEach((entry, index) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${entry.name}</td>
            <td>${entry.score}</td>
          `;
          tableBody.appendChild(row);
        });
      } catch (error) {
        console.error('Failed to fetch leaderboard:', error);
      }
    }

    async function fetchComments() {
      try {
        const response = await fetch('https://shiemir.my.id/boat_adventure/leaderboard.php?comments=1');
        const comments = await response.json();
        const list = document.getElementById('commentList');
        list.innerHTML = '';
        comments.forEach(c => {
          const div = document.createElement('div');
          div.className = 'comment-item';
          div.innerHTML = `
            <div>${c.comment}</div>
            <time>${new Date(c.timestamp).toLocaleString()}</time>
          `;
          list.appendChild(div);
        });
      } catch (error) {
        console.error('Failed to fetch comments:', error);
      }
    }

    async function submitComment(event) {
      event.preventDefault();
      const comment = document.getElementById('commentText').value.trim();
      if (!comment) return alert('Comment cannot be empty.');

      try {
        await fetch('https://shiemir.my.id/boat_adventure/leaderboard.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ comment })
        });
        document.getElementById('commentText').value = '';
        fetchComments();
      } catch (error) {
        console.error('Failed to submit comment:', error);
      }
    }

    window.addEventListener('load', () => {
      fetchLeaderboard();
      fetchComments();
    });
  </script>
</body>
</html>
